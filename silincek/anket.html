<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geçici Anket - Forma Oy Ver</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-container { max-width: 600px; margin: auto; }
        .forma { display: inline-block; margin: 10px; text-align: center; }
        .forma img { width: 200px; height: 300px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .back-button { position: absolute; top: 20px; left: 20px; padding: 10px 20px; background-color: #e74c3c; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.location.href='../index.html'">Ana Menüye Dön</button>

    <div class="form-container">
        <h1>Geçici Anket: En Sevdiğiniz Forma</h1>
        <p>İsminizi girin ve favori formanızı seçin!</p>
        <label for="isim">İsim:</label>
        <input type="text" id="isim" placeholder="İsminizi girin"><br><br>
        
        <div class="formalar">
            <div class="forma">
                <img src="forma1.jpeg" alt="Forma 1">
                <br>
                <p>Oy sayısı: <span id="oy-Forma 1">0</span></p>
                <button onclick="(async () => await oyVer('Forma 1'))()">Oy Ver - Forma 1</button>
            </div>
            <div class="forma">
                <img src="forma2.jpeg" alt="Forma 2">
                <br>
                <p>Oy sayısı: <span id="oy-Forma 2">0</span></p>
                <button onclick="(async () => await oyVer('Forma 2'))()">Oy Ver - Forma 2</button>
            </div>
            <div class="forma">
                <img src="forma3.jpeg" alt="Forma 3">
                <br>
                <p>Oy sayısı: <span id="oy-Forma 3">0</span></p>
                <button onclick="(async () => await oyVer('Forma 3'))()">Oy Ver - Forma 3</button>
            </div>
            <div class="forma">
                <img src="forma4.jpeg" alt="Forma 4">
                <br>
                <p>Oy sayısı: <span id="oy-Forma 4">0</span></p>
                <button onclick="(async () => await oyVer('Forma 4'))()">Oy Ver - Forma 4</button>
            </div>
            <div class="forma">
                <img src="forma5.jpeg" alt="Forma 5">
                <br>
                <p>Oy sayısı: <span id="oy-Forma 5">0</span></p>
                <button onclick="(async () => await oyVer('Forma 5'))()">Oy Ver - Forma 5</button>
            </div>
            <div class="forma">
                <img src="forma6.jpeg" alt="Forma 6">
                <br>
                <p>Oy sayısı: <span id="oy-Forma 6">0</span></p>
                <button onclick="(async () => await oyVer('Forma 6'))()">Oy Ver - Forma 6</button>
            </div>
        </div>

        <br>
        <h3>Oy Verenler</h3>
        <ul id="oy-verenler-listesi"></ul>
        <button onclick="(async () => await indirOyVerenler())()">Oy Verenleri İndir (TXT)</button>
        <button onclick="(async () => await indirOyVerileriJSON())()">Oy Verilerini İndir (JSON)</button>
    </div>

    <script>
        // GitHub Repo bilgileri - kendi token'ınızı buraya koyun
        const username = 'susrybla-lab';
        const repo = 's-haber';
        const token = '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';

        function base64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        function base64DecodeUnicode(str) {
            return decodeURIComponent(Array.prototype.map.call(atob(str), function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        async function loadVotes() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/silincek/votes.json`);
                if (!response.ok) {
                    console.error('Oy verileri yüklenirken hata:', response.status, await response.text());
                    return [];
                }
                const data = await response.json();
                const content = base64DecodeUnicode(data.content);
                console.log('Oy verileri GitHub\'dan yüklendi:', JSON.parse(content));
                return JSON.parse(content);
            } catch (error) {
                console.error('Oy verileri yüklenirken hata:', error);
                return [];
            }
        }

        async function saveVotes(votes) {
            try {
                let sha = null;
                try {
                    const getRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/silincek/votes.json`);
                    const getData = await getRes.json();
                    sha = getData.sha;
                } catch (e) {
                    // Dosya yoksa
                }
                const content = base64EncodeUnicode(JSON.stringify(votes, null, 2));
                const body = {
                    message: 'Update votes',
                    content: content
                };
                if (sha) body.sha = sha;
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/silincek/votes.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if (response.ok) {
                    console.log('Oy verileri GitHub\'a kaydedildi.');
                    return true;
                } else {
                    const text = await response.text();
                    console.error('Kaydetme hatası:', response.status, text);
                    alert('Oy kaydedilemedi. Token veya GitHub izinlerini kontrol edin.');
                    return false;
                }
            } catch (error) {
                console.error('Oy verileri kaydedilirken hata:', error);
                alert('Oy kaydedilirken bir hata oluştu. Konsolu kontrol edin.');
                return false;
            }
        }

        async function oySayilariniGoster() {
            const oylar = await loadVotes();
            const sayilar = {};
            oylar.forEach(oy => {
                sayilar[oy.forma] = (sayilar[oy.forma] || 0) + 1;
            });
            document.getElementById('oy-Forma 1').innerText = sayilar['Forma 1'] || 0;
            document.getElementById('oy-Forma 2').innerText = sayilar['Forma 2'] || 0;
            document.getElementById('oy-Forma 3').innerText = sayilar['Forma 3'] || 0;
            document.getElementById('oy-Forma 4').innerText = sayilar['Forma 4'] || 0;
            document.getElementById('oy-Forma 5').innerText = sayilar['Forma 5'] || 0;
            document.getElementById('oy-Forma 6').innerText = sayilar['Forma 6'] || 0;

            // Oy verenleri listele
            const listesi = document.getElementById('oy-verenler-listesi');
            listesi.innerHTML = '';
            oylar.forEach(oy => {
                const li = document.createElement('li');
                li.textContent = `${oy.isim} - ${oy.forma}`;
                listesi.appendChild(li);
            });
        }

        async function indirOyVerenler() {
            const oylar = await loadVotes();
            let text = 'Oy Verenler Listesi:\n\n';
            oylar.forEach(oy => {
                text += `${oy.isim} - ${oy.forma}\n`;
            });
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'oy-verenler.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function oyVer(forma) {
            const isim = document.getElementById('isim').value.trim();
            if (!isim) {
                alert('Lütfen isminizi girin!');
                return;
            }
            // Oyları repo'dan oku
            let oylar = await loadVotes();
            // İsim kontrolü: Eğer bu isim zaten oy vermişse, izin verme
            const zatenOyVermiş = oylar.some(oy => oy.isim.toLowerCase() === isim.toLowerCase());
            if (zatenOyVermiş) {
                alert(`${isim}, zaten oy verdiniz! Bir daha oy veremezsiniz.`);
                return;
            }
            // Yeni oy ekle
            oylar.push({isim, forma});
            // Kaydet
            const saved = await saveVotes(oylar);
            if (!saved) return;
            alert(`${isim}, ${forma} için oy verdiğiniz için teşekkürler!`);
            console.log(`${isim} - ${forma}`);
            // İsim alanını temizle
            document.getElementById('isim').value = '';
            // Oy sayılarını güncelle
            await oySayilariniGoster();
        }

        async function indirOyVerileriJSON() {
            const oylar = await loadVotes();
            const blob = new Blob([JSON.stringify(oylar, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'oy-verileri.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        window.onload = async () => { await oySayilariniGoster(); };
    </script>
</body>
</html>
