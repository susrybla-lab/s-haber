<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Haber | Detay</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="light-theme">
    <header>
        <div class="container header-content">
            <div class="logo" onclick="window.location.href='index.html'">S-HABER</div>
            <nav>
                <ul>
                    <li><a href="#" onclick="window.location.href='index.html'">Ana Sayfa</a></li>
                    <li><a href="#" onclick="window.location.href='index.html?cat=Ekonomi'">Ekonomi</a></li>
                    <li><a href="#" onclick="window.location.href='index.html?cat=Spor'">Spor</a></li>
                    <li><a href="#" onclick="window.location.href='index.html?cat=Teknoloji'">Teknoloji</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="ticker-container">
        <div class="ticker-label">SON DAKİKA</div>
        <marquee>S-Haber yayın hayatına başladı! • Sivas Cumhuriyet Üniversitesi Gazetecilik Bölümü gururla sunar.</marquee>
    </div>
    </header>
    <main class="container" style="margin-top:30px; background:var(--card-bg); padding:30px; border-radius:12px;">
        <h1 id="detay-baslik">Yükleniyor...</h1>
        <img id="detay-resim" src="" style="width:100%; border-radius:10px; display:none;">
        <div id="detay-metin" style="margin-top:20px; line-height:1.8;"></div>
    </main>
    <script>
        const file = new URLSearchParams(window.location.search).get('haber');
        if (file) {
            fetch(`https://raw.githubusercontent.com/susrybla-lab/s-haber/main/haberler/${file}`)
                .then(r => r.text())
                .then(text => {
                    const title = text.match(/title:\s*"(.*)"/)?.[1] || text.match(/title:\s*(.*)/)?.[1];
                    const image = text.match(/image:\s*"(.*)"/)?.[1] || text.match(/image:\s*(.*)/)?.[1];
                    const content = text.split('---').pop();
                    document.getElementById('detay-baslik').innerText = title;
                    if(image) { document.getElementById('detay-resim').src = image; document.getElementById('detay-resim').style.display='block'; }
                    document.getElementById('detay-metin').innerHTML = marked.parse(content);
                });
        }
    </script>
</body>
</html>
