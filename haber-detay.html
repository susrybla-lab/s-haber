<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Detayı | S-Haber</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="light-theme">
    <header>
        <div class="container header-content">
            <div class="logo" onclick="window.location.href='index.html'">S-HABER</div>
            <button onclick="window.history.back()" class="btn-read">← Geri Dön</button>
        </div>
    </header>

    <main class="container detay-container">
        <article id="news-article">
            <h1 id="news-title">Yükleniyor...</h1>
            <img id="news-image" src="" alt="" style="width:100%; border-radius:10px; margin: 20px 0; display:none;">
            <div id="news-content" class="content-body"></div>
        </article>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('haber');

        if (fileName) {
            fetch(`https://raw.githubusercontent.com/susrybla-lab/s-haber/main/haberler/${fileName}`)
                .then(res => res.text())
                .then(text => {
                    const title = text.match(/title:\s*"(.*)"/)?.[1] || text.match(/title:\s*(.*)/)?.[1];
                    const image = text.match(/image:\s*"(.*)"/)?.[1] || text.match(/image:\s*(.*)/)?.[1];
                    const content = text.split('---').pop();

                    document.getElementById('news-title').innerText = title;
                    if(image) {
                        const img = document.getElementById('news-image');
                        img.src = image;
                        img.style.display = 'block';
                    }
                    document.getElementById('news-content').innerHTML = marked.parse(content);
                });
        }
    </script>
</body>
</html>
