<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Haber | En Hızlı ve Güvenilir Haberler</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="light-theme">

    <header>
        <div class="container header-content">
            <div class="logo" onclick="window.location.href='index.html'">S-HABER</div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Haber ara..." onkeyup="searchNews()">
            </div>

            <nav>
                <ul id="main-nav">
                    <li><a href="#" onclick="filterCategory('Gündem')">Gündem</a></li>
                    <li><a href="#" onclick="filterCategory('Ekonomi')">Ekonomi</a></li>
                    <li><a href="#" onclick="filterCategory('Spor')">Spor</a></li>
                    <li><a href="#" onclick="filterCategory('Teknoloji')">Teknoloji</a></li>
                </ul>
            </nav>
            <button id="theme-toggle">🌙 / ☀️</button>
        </div>
    </header>

    <div class="ticker-container">
        <div class="ticker-label">SON DAKİKA</div>
        <marquee id="ticker-text">S-Haber yayın hayatına başladı! • Sivas Cumhuriyet Üniversitesi'nde dijital dönüşüm.</marquee>
    </div>

    <main class="container">
        <section class="headline-section">
            <div id="dynamic-news-list" class="news-grid">
                <p>Haberler yükleniyor...</p>
            </div>

            <aside class="sidebar">
                <h3>Öne Çıkanlar</h3>
                <ul class="top-list" id="sidebar-list">
                    </ul>
            </aside>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 S-Haber | Editör: İdris Samet Eker</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Haberleri GitHub'dan çekme motoru
        const username = "susrybla-lab";
        const repo = "s-haber";
        
        async function loadNews() {
            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/haberler`);
                const files = await res.json();
                const grid = document.getElementById('dynamic-news-list');
                const sidebar = document.getElementById('sidebar-list');
                grid.innerHTML = '';
                sidebar.innerHTML = '';

                const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse();

                for (let [index, file] of mdFiles.entries()) {
                    const contentRes = await fetch(file.download_url);
                    const text = await contentRes.text();

                    const title = text.match(/title:\s*"(.*)"/)?.[1] || text.match(/title:\s*(.*)/)?.[1];
                    const image = text.match(/image:\s*"(.*)"/)?.[1] || text.match(/image:\s*(.*)/)?.[1] || 'img/placeholder.jpg';
                    
                    // Ana Grid Kartları
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${image}" alt="${title}">
                        <div class="card-body">
                            <h3>${title}</h3>
                            <a href="haber-detay.html?haber=${file.name}" class="btn-read">Devamı</a>
                        </div>
                    `;
                    grid.appendChild(card);

                    // Sidebar (Çok Okunanlar yerine Son Haberler)
                    if(index < 5) {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="haber-detay.html?haber=${file.name}"><span class="number">${index+1}</span> ${title}</a>`;
                        sidebar.appendChild(li);
                    }
                }
            } catch (e) { grid.innerHTML = "Haberler şu an yüklenemiyor."; }
        }
        loadNews();
    </script>
</body>
</html>
